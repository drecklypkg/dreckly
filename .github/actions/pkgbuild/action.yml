name: pkgbuild
inputs:
  platform:
    description: 'Target platform to build on'
    required: true
    type: string
  pkgbuild-files:
    description: 'List of files to consider for building'
    required: true
    type: string
  binpkg-sites:
    description: 'Setting for BINPKG_SITES'
    type: string
runs:
  using: composite
  steps:
    - name: Build packages
      shell: bash
      env:
        BINPKG_SITES: ${{ inputs.binpkg-sites }}
        PKGBUILD_FILES: ${{ inputs.pkgbuild-files }}
      run: ./.github/scripts/pkgbuild.sh
    - name: Archive build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ inputs.platform }}
        path: wrkdir
